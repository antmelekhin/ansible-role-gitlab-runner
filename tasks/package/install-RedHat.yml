---
- name: 'RedHat | Configure the repository and install the GitLab Runner package'
  become: true
  block:
    - name: 'RedHat | Ensure the dependencies are installed'
      ansible.builtin.package:
        name:
          - 'ca-certificates'
          - 'yum-utils'
        state: 'present'

    - name: 'RedHat | Add the GitLab Runner repository'
      ansible.builtin.template:
        src: 'gitlab-runner.repo.j2'
        dest: '{{ __gitlab_runner_repository_file }}'
        owner: 'root'
        group: 'root'
        mode: 0644

    - name: 'RedHat | Install the GitLab Runner package'
      ansible.builtin.yum:
        name: '{{ __gitlab_runner_package }}'
        allow_downgrade: true
        update_cache: true
        state: "{{ (gitlab_runner_setup == 'upgrade') | ternary('latest', 'present') }}"
      ignore_errors: '{{ ansible_check_mode }}'
